services:
  - type: web
    name: crypto-guardian-api
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: NODE_ENV=production pnpm start
    healthCheckPath: /health
    healthCheckTimeout: 100
    healthCheckInterval: 10
    envVars:
      - key: NODE_ENV
        value: development
      - key: PORT
        value: 3001
      - key: ETHERSCAN_API_KEY
        sync: false

